# Main menu navigation (Ң§әҪДҝдӣ)
# see https://butterfly.js.org/posts/4aa8abbe/#Ң§әҪІЛҶО
# --------------------------------------

menu:
  # Home: / || fas fa-home
  # Archives: /archives/ || fas fa-archive
  # Tags: /tags/ || fas fa-tags
  # Categories: /categories/ || fas fa-folder-open
  # List||fas fa-list:
  #   Music: /music/ || fas fa-music
  #   Movie: /movies/ || fas fa-video
  # Link: /link/ || fas fa-link
  # About: /about/ || fas fa-heart

# Code Blocks (ҙъҙaПакP)
# --------------------------------------

highlight_theme: light #  darker / pale night / light / ocean / mac / mac light / false
highlight_copy: true # copy button
highlight_lang: true # show the code language
highlight_shrink: false # true: shrink the code blocks / false: expand the code blocks | none: expand code blocks and hide the button
highlight_height_limit: false # unit: px
code_word_wrap: false

# copy settings
# copyright: Add the copyright information after copied content (С}СuөДғИИЭббГжјУЙП°жҷаРЕПў)
copy:
  enable: true
  copyright:
    enable: false
    limit_count: 50

# social settings (ЙзҪ»ҲDҳЛФOЦГ)
# formal:
#   icon: link || the description
social:
  # fab fa-github: https://github.com/xxxxx || Github
  # fas fa-envelope: mailto:xxxxxx@gmail.com || Email

# search (ЛСЛч)
# --------------------------------------

# Algolia search
algolia_search:
  enable: false
  hits:
    per_page: 6

# Local search
local_search:
  enable: false

# Math (”өҢW)
# --------------------------------------
# About the per_page
# if you set it to true, it will load mathjax/katex script in each page (true ұнКҫГҝТ»н“¶јјУЭdjs)
# if you set it to false, it will load mathjax/katex script according to your setting (add the 'mathjax: true' in page's front-matter)
# (false РиТӘ•rјУЭdЈ¬нҡФЪК№УГөД Markdown Front-matter јУЙП mathjax: true)

# MathJax
mathjax:
  enable: false
  per_page: false

# KaTeX
katex:
  enable: false
  per_page: false
  hide_scrollbar: true

# Image (ҲDЖ¬ФOЦГ)
# --------------------------------------

# FaviconЈЁҫWХҫҲDҳЛЈ©
favicon: /img/favicon.png

# Avatar (о^Пс)
avatar:
  img: https://i.loli.net/2021/02/24/5O1day2nriDzjSu.png
  effect: false

# Disable all banner image
disable_top_img: false

# The banner image of home page
index_img:

# If the banner of page not setting, it will show the top_img
default_top_img:

# The banner image of archive page
archive_img:

# If the banner of tag page not setting, it will show the top_img
# note: tag page, not tags page (ЧУҳЛ»`н“ГжөД top_img)
tag_img:

# The banner image of tag page
# format:
#  - tag name: xxxxx
tag_per_img:

# If the banner of category page not setting, it will show the top_img
# note: category page, not categories page (ЧУ·Цоҗн“ГжөД top_img)
category_img:

# The banner image of category page
# format:
#  - category name: xxxxx
category_per_img:

cover:
  # display the cover or not (КЗ·сп@КҫОДХВ·вГж)
  index_enable: true
  aside_enable: true
  archives_enable: true
  # the position of cover in home page (·вГжп@КҫөДО»ЦГ)
  # left/right/both
  position: both
  # When cover is not set, the default cover is displayed (®”ӣ]УРФOЦГcover•rЈ¬Д¬ХJөД·вГжп@Кҫ)
  default_cover:
    # - https://i.loli.net/2020/05/01/gkihqEjXxJ5UZ1C.jpg

# Replace Broken Images (Мж“Qҹo·Ёп@КҫөДҲDЖ¬)
error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

# A simple 404 page
error_404:
  enable: false
  subtitle: 'Page Not Found'
  background: https://i.loli.net/2020/05/19/aKOcLiyPl2JQdFD.png

post_meta:
  page: # Home Page
    date_type: created # created or updated or both Цчн“ОДХВИХЖЪКЗ„“ҪЁИХ»тХЯёьРВИХ»т¶јп@Кҫ
    date_format: date # date/relative п@КҫИХЖЪЯҖКЗПаҢҰИХЖЪ
    categories: true # true or false Цчн“КЗ·сп@Кҫ·Цоҗ
    tags: false # true or false Цчн“КЗ·сп@КҫҳЛ»`
    label: true # true or false п@КҫГиКцРФОДЧЦ
  post:
    date_type: both # created or updated or both ОДХВн“ИХЖЪКЗ„“ҪЁИХ»тХЯёьРВИХ»т¶јп@Кҫ
    date_format: date # date/relative п@КҫИХЖЪЯҖКЗПаҢҰИХЖЪ
    categories: true # true or false ОДХВн“КЗ·сп@Кҫ·Цоҗ
    tags: true # true or false ОДХВн“КЗ·сп@КҫҳЛ»`
    label: true # true or false п@КҫГиКцРФОДЧЦ

# wordcount (ЧЦ”өҪyУӢ)
wordcount:
  enable: false
  post_wordcount: true
  min2read: true
  total_wordcount: true

# Display the article introduction on homepage
# 1: description
# 2: both (if the description exists, it will show description, or show the auto_excerpt)
# 3: auto_excerpt (default)
# false: do not show the article introduction
index_post_content:
  method: 3
  length: 500 # if you set method to 2 or 3, the length need to config

# anchor
# when you scroll in post, the URL will update according to header id.
anchor: false

# Post
# --------------------------------------

# toc (Дҝдӣ)
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false # for post

post_copyright:
  enable: true
  decode: false
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# Sponsor/reward
reward:
  enable: false
  QR_code:
    # - img: /img/wechat.jpg
    #   link:
    #   text: wechat
    # - img: /img/alipay.jpg
    #   link:
    #   text: alipay

# Post edit
# Easily browse and edit blog source code online.
post_edit:
  enable: false
  # url: https://github.com/user-name/repo-name/edit/branch-name/subdirectory-name/
  # For example: https://github.com/jerryc127/butterfly.js.org/edit/main/source/
  url:

# Related Articles
related_post:
  enable: true
  limit: 6 # Number of posts displayed
  date_type: created # or created or updated ОДХВИХЖЪп@Кҫ„“ҪЁИХ»тХЯёьРВИХ

# figcaption (ҲDЖ¬ГиКцОДЧЦ)
photofigcaption: false

# post_pagination (·Цн“)
# value: 1 || 2 || false
# 1: The 'next post' will link to old post
# 2: The 'next post' will link to new post
# false: disable pagination
post_pagination: 1

# Displays outdated notice for a post (ОДХВЯ^ЖЪМбРС)
noticeOutdate:
  enable: false
  style: flat # style: simple/flat
  limit_day: 500 # When will it be shown
  position: top # position: top/bottom
  message_prev: It has been
  message_next: days since the last update, the content of the article may be outdated.

# Share System (·ЦПн№ҰДЬ)
